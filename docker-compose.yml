version: '3.8'

services:
  backend:
    build:
      context: ../backend
      target: production
    container_name: movie-finder-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/moviedb
      - QDRANT_URL=http://qdrant:6333
      - TESTING_LIMIT=${TESTING_LIMIT:-100} # Limits local model test subset
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - movie-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: movie-finder-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - movie-network

  postgres:
    image: postgres:15-alpine
    container_name: movie-finder-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moviedb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - movie-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: movie-finder-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - movie-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  movie-network:
    driver: bridge
